name: Build and Push Docker Images

on:
  push:
    branches:
      - 'feat/v4.15.1/*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract branch name for Docker tag
        id: extract_tag
        shell: bash
        run: |
          # Extrae la rama actual (ej. feat/v4.15.1/respuestas-rapidas)
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          
          # Quita el prefijo 'feat/' (ej. v4.15.1/respuestas-rapidas)
          CLEAN_NAME=$(echo "$BRANCH_NAME" | sed 's/^feat\///')
          
          # Reemplaza '/' por '-' porque Docker no permite slashes en los tags
          # Resultado: v4.15.1-respuestas-rapidas
          TAG_NAME=$(echo "$CLEAN_NAME" | sed 's/\//-/g')
          
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/chatwoot-custom:${{ steps.extract_tag.outputs.tag }}
